server:
  port: 8080

spring:
  application:
    name: codepilot-ai-review
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${CODEPILOT_DB_URL:jdbc:postgresql://localhost:15432/codepilot}
    username: ${CODEPILOT_DB_USERNAME:codepilot}
    password: ${CODEPILOT_DB_PASSWORD:codepilot123}
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    clean-disabled: true
    validate-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${CODEPILOT_REDIS_HOST:localhost}
      port: ${CODEPILOT_REDIS_PORT:16379}
      database: ${CODEPILOT_REDIS_DATABASE:0}
      timeout: ${CODEPILOT_REDIS_TIMEOUT:3s}
  rabbitmq:
    host: ${CODEPILOT_RABBITMQ_HOST:localhost}
    port: ${CODEPILOT_RABBITMQ_PORT:5672}
    username: ${CODEPILOT_RABBITMQ_USERNAME:codepilot}
    password: ${CODEPILOT_RABBITMQ_PASSWORD:codepilot123}
    virtual-host: ${CODEPILOT_RABBITMQ_VIRTUAL_HOST:/}
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: ${CODEPILOT_RABBITMQ_DEFAULT_REQUEUE_REJECTED:false}
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2
          max-interval: 5000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    com.codepilot: info

codepilot:
  api-auth:
    enabled: ${CODEPILOT_API_AUTH_ENABLED:true}
    api-key: ${CODEPILOT_API_AUTH_API_KEY:}
    header-name: ${CODEPILOT_API_AUTH_HEADER_NAME:X-CodePilot-Api-Key}
    protected-path-patterns: ${CODEPILOT_API_AUTH_PROTECTED_PATH_PATTERNS:/api/**}
    exclude-path-patterns: ${CODEPILOT_API_AUTH_EXCLUDE_PATH_PATTERNS:/api/github/webhook,/api/github/webhook/**}
  github:
    api-base-url: https://api.github.com
    token: ${CODEPILOT_GITHUB_TOKEN:}
    comment-enabled: ${CODEPILOT_GITHUB_COMMENT_ENABLED:false}
    comment-marker: "${CODEPILOT_GITHUB_COMMENT_MARKER:<!-- codepilot-ai-review:liche719/codeAireview -->}"
    inline-comment-enabled: ${CODEPILOT_GITHUB_INLINE_COMMENT_ENABLED:false}
    inline-comment-max-per-task: ${CODEPILOT_GITHUB_INLINE_COMMENT_MAX_PER_TASK:10}
    webhook-enabled: ${CODEPILOT_GITHUB_WEBHOOK_ENABLED:false}
    webhook-secret: ${CODEPILOT_GITHUB_WEBHOOK_SECRET:}
    webhook-skip-signature-when-secret-empty: ${CODEPILOT_GITHUB_WEBHOOK_SKIP_SIGNATURE_WHEN_SECRET_EMPTY:false}
    bot-mention-aliases: ${CODEPILOT_GITHUB_BOT_MENTION_ALIASES:@x-pilotx,@X-PilotX}
    allowed-repositories: ${CODEPILOT_GITHUB_ALLOWED_REPOSITORIES:}
    allowed-comment-author-associations: ${CODEPILOT_GITHUB_ALLOWED_COMMENT_AUTHOR_ASSOCIATIONS:OWNER,MEMBER,COLLABORATOR}
    fix-enabled: ${CODEPILOT_GITHUB_FIX_ENABLED:false}
    fix-max-files: ${CODEPILOT_GITHUB_FIX_MAX_FILES:3}
    fix-max-changed-lines: ${CODEPILOT_GITHUB_FIX_MAX_CHANGED_LINES:120}
    fix-validation-command: ${CODEPILOT_GITHUB_FIX_VALIDATION_COMMAND:git diff --check}
    fix-allowed-validation-commands: ${CODEPILOT_GITHUB_FIX_ALLOWED_VALIDATION_COMMANDS:git diff --check}
    fix-validation-inherit-environment: ${CODEPILOT_GITHUB_FIX_VALIDATION_INHERIT_ENVIRONMENT:false}
    fix-validation-timeout-seconds: ${CODEPILOT_GITHUB_FIX_VALIDATION_TIMEOUT_SECONDS:300}
  review:
    max-files-per-task: ${CODEPILOT_REVIEW_MAX_FILES_PER_TASK:30}
    max-patch-chars-per-file: ${CODEPILOT_REVIEW_MAX_PATCH_CHARS_PER_FILE:12000}
    max-total-patch-chars: ${CODEPILOT_REVIEW_MAX_TOTAL_PATCH_CHARS:80000}
  llm:
    enabled: true
    provider: openai-compatible
    base-url: ${CODEPILOT_LLM_BASE_URL:https://api.openai.com/v1}
    api-key: ${CODEPILOT_LLM_API_KEY:}
    model: ${CODEPILOT_LLM_MODEL:gpt-4o-mini}
    temperature: 0.2
    timeout-seconds: 60
    max-review-patch-chars: ${CODEPILOT_LLM_MAX_REVIEW_PATCH_CHARS:12000}
    max-review-rules-chars: ${CODEPILOT_LLM_MAX_REVIEW_RULES_CHARS:4000}
    max-review-context-chars: ${CODEPILOT_LLM_MAX_REVIEW_CONTEXT_CHARS:8000}
  embedding:
    enabled: true
    provider: openai-compatible
    base-url: ${CODEPILOT_EMBEDDING_BASE_URL:${CODEPILOT_LLM_BASE_URL:https://api.openai.com/v1}}
    api-key: ${CODEPILOT_EMBEDDING_API_KEY:${CODEPILOT_LLM_API_KEY:}}
    model: ${CODEPILOT_EMBEDDING_MODEL:text-embedding-3-small}
    dimension: ${CODEPILOT_EMBEDDING_DIMENSION:0}
    timeout-seconds: 60
  rag:
    enabled: true
    top-k: 3
    max-context-chars: 2000
    min-content-length: 20
  tools:
    enabled: true
    sql-risk-enabled: true
    secret-scan-enabled: true
    test-suggestion-enabled: true
