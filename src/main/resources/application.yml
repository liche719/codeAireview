server:
  port: 8080

spring:
  application:
    name: codepilot-ai-review
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/codepilot
    username: codepilot
    password: codepilot123
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3s
  rabbitmq:
    host: localhost
    port: 5672
    username: codepilot
    password: codepilot123
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2
          max-interval: 5000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    com.codepilot: info

codepilot:
  github:
    api-base-url: https://api.github.com
    token: ${CODEPILOT_GITHUB_TOKEN:}
    comment-enabled: true
    comment-marker: "<!-- codepilot-ai-review -->"
  llm:
    enabled: true
    provider: openai-compatible
    base-url: ${CODEPILOT_LLM_BASE_URL:https://api.openai.com/v1}
    api-key: ${CODEPILOT_LLM_API_KEY:}
    model: ${CODEPILOT_LLM_MODEL:gpt-4o-mini}
    temperature: 0.2
    timeout-seconds: 60
  embedding:
    enabled: true
    provider: openai-compatible
    base-url: ${CODEPILOT_EMBEDDING_BASE_URL:${CODEPILOT_LLM_BASE_URL:https://api.openai.com/v1}}
    api-key: ${CODEPILOT_EMBEDDING_API_KEY:${CODEPILOT_LLM_API_KEY:}}
    model: ${CODEPILOT_EMBEDDING_MODEL:text-embedding-3-small}
    dimension: 1536
    timeout-seconds: 60
  rag:
    enabled: true
    top-k: 3
    max-context-chars: 2000
    min-content-length: 20
  tools:
    enabled: true
    sql-risk-enabled: true
    secret-scan-enabled: true
    test-suggestion-enabled: true
