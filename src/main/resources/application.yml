server:
  port: 8080

spring:
  application:
    name: codepilot-ai-review
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/codepilot
    username: codepilot
    password: codepilot123
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3s
  rabbitmq:
    host: localhost
    port: 5672
    username: codepilot
    password: codepilot123
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

knife4j:
  enable: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    com.codepilot: info

codepilot:
  github:
    api-base-url: https://api.github.com
    token:
  llm:
    enabled: true
    provider: openai-compatible
    base-url: ${CODEPILOT_LLM_BASE_URL:https://api.openai.com/v1}
    api-key: ${CODEPILOT_LLM_API_KEY:}
    model: ${CODEPILOT_LLM_MODEL:gpt-4o-mini}
    temperature: 0.2
    timeout-seconds: 60
