services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: codepilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: codepilot
      POSTGRES_USER: codepilot
      POSTGRES_PASSWORD: codepilot123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  redis:
    image: redis:7.4
    container_name: codepilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: codepilot-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: codepilot
      RABBITMQ_DEFAULT_PASS: codepilot123
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres-data:
