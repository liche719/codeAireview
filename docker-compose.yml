services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: codepilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CODEPILOT_DB_NAME:-codepilot}
      POSTGRES_USER: ${CODEPILOT_DB_USERNAME:-codepilot}
      POSTGRES_PASSWORD: ${CODEPILOT_DB_PASSWORD:-codepilot123}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  redis:
    image: redis:7.4
    container_name: codepilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: codepilot-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${CODEPILOT_RABBITMQ_USERNAME:-codepilot}
      RABBITMQ_DEFAULT_PASS: ${CODEPILOT_RABBITMQ_PASSWORD:-codepilot123}
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres-data:
