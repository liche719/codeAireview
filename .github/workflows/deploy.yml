name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codepilot-production-deploy
  cancel-in-progress: true

env:
  SERVER_HOST: ${{ vars.CODEPILOT_DEPLOY_HOST || '121.43.251.65' }}
  SERVER_USER: ${{ vars.CODEPILOT_DEPLOY_USER || 'root' }}
  SERVER_DIR: ${{ vars.CODEPILOT_DEPLOY_DIR || '/opt/codeAireview' }}
  SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          set -euo pipefail
          if [ -z "${SERVER_HOST:-}" ]; then
            echo "Repository variable CODEPILOT_DEPLOY_HOST is required or must fall back to a default host." >&2
            exit 1
          fi
          if [ -z "${SERVER_PASSWORD:-}" ]; then
            echo "Secret SERVER_PASSWORD is required for password-based deployment." >&2
            exit 1
          fi
          DEPLOY_DIR="${SERVER_DIR:-/opt/codeAireview}"
          if [ "${DEPLOY_DIR#/}" = "$DEPLOY_DIR" ]; then
            echo "CODEPILOT_DEPLOY_DIR must be an absolute path." >&2
            exit 1
          fi
          DEPLOY_DIR="${DEPLOY_DIR%/}"
          case "${DEPLOY_DIR%/}" in
            ""|"/"|"/home"|"/root"|"/opt"|"/srv"|"/tmp"|"/var"|"/usr"|"/etc"|"/var/www")
              echo "CODEPILOT_DEPLOY_DIR points to an unsafe top-level directory: ${DEPLOY_DIR}" >&2
              exit 1
              ;;
          esac
          DEPLOY_DIR_WITHOUT_ROOT="${DEPLOY_DIR#/}"
          if [ "${DEPLOY_DIR_WITHOUT_ROOT#*/}" = "$DEPLOY_DIR_WITHOUT_ROOT" ]; then
            echo "CODEPILOT_DEPLOY_DIR must be at least two path segments below root, for example /opt/codeAireview." >&2
            exit 1
          fi
          {
            echo "SERVER_HOST=${SERVER_HOST}"
            echo "SERVER_USER=${SERVER_USER:-deploy}"
            echo "SERVER_DIR=${DEPLOY_DIR}"
          } >> "$GITHUB_ENV"

      - name: Prepare SSH tools
        run: |
          set -euo pipefail
          install -m 700 -d "$HOME/.ssh"
          sudo apt-get update
          sudo apt-get install -y sshpass
          ssh-keyscan -H "$SERVER_HOST" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Create deployment archive
        run: |
          set -euo pipefail
          git archive --format=tar -o "$RUNNER_TEMP/codepilot-deploy.tar" HEAD

      - name: Upload archive to server
        run: |
          set -euo pipefail
          sshpass -p "$SERVER_PASSWORD" scp \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -o StrictHostKeyChecking=yes \
            "$RUNNER_TEMP/codepilot-deploy.tar" \
            "${SERVER_USER}@${SERVER_HOST}:/tmp/codepilot-deploy.tar"

      - name: Deploy on server
        run: |
          set -euo pipefail
          DEPLOY_DIR_ESCAPED="$(printf '%q' "$SERVER_DIR")"
          sshpass -p "$SERVER_PASSWORD" ssh \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -o StrictHostKeyChecking=yes \
            "${SERVER_USER}@${SERVER_HOST}" \
            "DEPLOY_DIR=${DEPLOY_DIR_ESCAPED} bash -s" <<'EOF'
          set -euo pipefail

          ARCHIVE="/tmp/codepilot-deploy.tar"

          if [ -z "${DEPLOY_DIR:-}" ] || [ "${DEPLOY_DIR#/}" = "$DEPLOY_DIR" ]; then
            echo "Unsafe deploy directory. DEPLOY_DIR must be an absolute path." >&2
            exit 1
          fi
          DEPLOY_DIR="${DEPLOY_DIR%/}"
          case "$DEPLOY_DIR" in
            ""|"/"|"/home"|"/root"|"/opt"|"/srv"|"/tmp"|"/var"|"/usr"|"/etc"|"/var/www")
              echo "Unsafe deploy directory: $DEPLOY_DIR" >&2
              exit 1
              ;;
          esac
          DEPLOY_DIR_WITHOUT_ROOT="${DEPLOY_DIR#/}"
          if [ "${DEPLOY_DIR_WITHOUT_ROOT#*/}" = "$DEPLOY_DIR_WITHOUT_ROOT" ]; then
            echo "Unsafe deploy directory. DEPLOY_DIR must be at least two path segments below root." >&2
            exit 1
          fi

          mkdir -p "$DEPLOY_DIR"

          if [ ! -f "$DEPLOY_DIR/.env" ]; then
            echo ".env is missing on the server. Please create it before deploying." >&2
            exit 1
          fi

          find "$DEPLOY_DIR" -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf -- {} +
          tar -xf "$ARCHIVE" -C "$DEPLOY_DIR"
          rm -f "$ARCHIVE"

          cd "$DEPLOY_DIR"
          docker compose -f docker-compose.server.yml down --remove-orphans || true
          docker rm -f codepilot-app >/dev/null 2>&1 || true
          docker compose -f docker-compose.server.yml up -d --build --remove-orphans
          echo "Waiting for app to answer on localhost:8080..."
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl --connect-timeout 2 --max-time 5 -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/api/github/webhook || true)
            echo "probe_${i}=${HTTP_CODE}"
            if [ "$HTTP_CODE" != "000" ]; then
              break
            fi
            sleep 5
          done
          echo "Post-deploy container status:"
          docker compose -f docker-compose.server.yml ps
          echo "Post-deploy webhook endpoint check:"
          curl -s -o /dev/null -w "localhost_webhook_http_code=%{http_code}\n" http://127.0.0.1:8080/api/github/webhook || true
          echo "Post-deploy app logs:"
          docker compose -f docker-compose.server.yml logs --no-color --tail=100 app || true
          EOF
