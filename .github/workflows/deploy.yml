name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codepilot-production-deploy
  cancel-in-progress: true

env:
  SERVER_HOST: 121.43.251.65
  SERVER_USER: root
  SERVER_DIR: /opt/codeAireview

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Create deployment archive
        run: |
          set -euo pipefail
          git archive --format=tar -o "$RUNNER_TEMP/codepilot-deploy.tar" HEAD

      - name: Upload archive to server
        env:
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -euo pipefail
          sshpass -p "$SERVER_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$RUNNER_TEMP/codepilot-deploy.tar" \
            "${SERVER_USER}@${SERVER_HOST}:/tmp/codepilot-deploy.tar"

      - name: Deploy on server
        env:
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -euo pipefail
          sshpass -p "$SERVER_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "${SERVER_USER}@${SERVER_HOST}" <<'EOF'
          set -euo pipefail

          DEPLOY_DIR="/opt/codeAireview"
          ARCHIVE="/tmp/codepilot-deploy.tar"

          mkdir -p "$DEPLOY_DIR"

          if [ ! -f "$DEPLOY_DIR/.env" ]; then
            echo ".env is missing on the server. Please create it before deploying." >&2
            exit 1
          fi

          find "$DEPLOY_DIR" -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf {} +
          tar -xf "$ARCHIVE" -C "$DEPLOY_DIR"
          rm -f "$ARCHIVE"

          cd "$DEPLOY_DIR"
          docker compose -f docker-compose.server.yml down --remove-orphans || true
          docker rm -f codepilot-app >/dev/null 2>&1 || true
          docker compose -f docker-compose.server.yml up -d --build --remove-orphans
          DB_USER="$(grep -E '^CODEPILOT_DB_USERNAME=' .env | head -n1 | cut -d= -f2-)"
          DB_NAME="$(grep -E '^CODEPILOT_DB_NAME=' .env | head -n1 | cut -d= -f2-)"
          DB_USER="${DB_USER:-codepilot}"
          DB_NAME="${DB_NAME:-codepilot}"
          echo "Current Flyway checksum:"
          docker compose -f docker-compose.server.yml exec -T postgres psql -U "$DB_USER" -d "$DB_NAME" -c "select version, checksum from flyway_schema_history where version = '1';" || true
          echo "Repairing Flyway checksum for migration version 1..."
          docker compose -f docker-compose.server.yml exec -T postgres psql -U "$DB_USER" -d "$DB_NAME" -c "update flyway_schema_history set checksum = -1411607468 where version = '1';" || true
          docker compose -f docker-compose.server.yml restart app || true
          echo "Waiting for app to answer on localhost:8080..."
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl --connect-timeout 2 --max-time 5 -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/api/github/webhook || true)
            echo "probe_${i}=${HTTP_CODE}"
            if [ "$HTTP_CODE" != "000" ]; then
              break
            fi
            sleep 5
          done
          echo "Post-deploy container status:"
          docker compose -f docker-compose.server.yml ps
          echo "Post-deploy webhook endpoint check:"
          curl -s -o /dev/null -w "localhost_webhook_http_code=%{http_code}\n" http://127.0.0.1:8080/api/github/webhook || true
          echo "Post-deploy app logs:"
          docker compose -f docker-compose.server.yml logs --no-color --tail=100 app || true
          EOF
