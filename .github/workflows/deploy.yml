name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codepilot-production-deploy
  cancel-in-progress: true

env:
  SERVER_HOST: ${{ vars.CODEPILOT_DEPLOY_HOST }}
  SERVER_USER: ${{ vars.CODEPILOT_DEPLOY_USER }}
  SERVER_DIR: ${{ vars.CODEPILOT_DEPLOY_DIR }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CODEPILOT_DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.CODEPILOT_DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          if [ -z "${SERVER_HOST:-}" ]; then
            echo "Repository variable CODEPILOT_DEPLOY_HOST is required." >&2
            exit 1
          fi
          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "Secret CODEPILOT_DEPLOY_SSH_KEY is required." >&2
            exit 1
          fi
          if [ -z "${KNOWN_HOSTS:-}" ]; then
            echo "Secret CODEPILOT_DEPLOY_KNOWN_HOSTS is required for SSH host key pinning." >&2
            exit 1
          fi
          {
            echo "SERVER_HOST=${SERVER_HOST}"
            echo "SERVER_USER=${SERVER_USER:-deploy}"
            echo "SERVER_DIR=${SERVER_DIR:-/opt/codeAireview}"
          } >> "$GITHUB_ENV"

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CODEPILOT_DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.CODEPILOT_DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/codepilot_deploy_key"
          chmod 600 "$HOME/.ssh/codepilot_deploy_key"
          printf '%s\n' "$KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
          cat > "$HOME/.ssh/config" <<EOF
          Host codepilot-deploy
            HostName ${SERVER_HOST}
            User ${SERVER_USER}
            IdentityFile ~/.ssh/codepilot_deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 "$HOME/.ssh/config"

      - name: Create deployment archive
        run: |
          set -euo pipefail
          git archive --format=tar -o "$RUNNER_TEMP/codepilot-deploy.tar" HEAD

      - name: Upload archive to server
        run: |
          set -euo pipefail
          scp \
            "$RUNNER_TEMP/codepilot-deploy.tar" \
            "codepilot-deploy:/tmp/codepilot-deploy.tar"

      - name: Deploy on server
        run: |
          set -euo pipefail
          DEPLOY_DIR_ESCAPED="$(printf '%q' "$SERVER_DIR")"
          ssh codepilot-deploy "DEPLOY_DIR=${DEPLOY_DIR_ESCAPED} bash -s" <<'EOF'
          set -euo pipefail

          ARCHIVE="/tmp/codepilot-deploy.tar"

          mkdir -p "$DEPLOY_DIR"

          if [ ! -f "$DEPLOY_DIR/.env" ]; then
            echo ".env is missing on the server. Please create it before deploying." >&2
            exit 1
          fi

          find "$DEPLOY_DIR" -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf {} +
          tar -xf "$ARCHIVE" -C "$DEPLOY_DIR"
          rm -f "$ARCHIVE"

          cd "$DEPLOY_DIR"
          docker compose -f docker-compose.server.yml down --remove-orphans || true
          docker rm -f codepilot-app >/dev/null 2>&1 || true
          docker compose -f docker-compose.server.yml up -d --build --remove-orphans
          echo "Waiting for app to answer on localhost:8080..."
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl --connect-timeout 2 --max-time 5 -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/api/github/webhook || true)
            echo "probe_${i}=${HTTP_CODE}"
            if [ "$HTTP_CODE" != "000" ]; then
              break
            fi
            sleep 5
          done
          echo "Post-deploy container status:"
          docker compose -f docker-compose.server.yml ps
          echo "Post-deploy webhook endpoint check:"
          curl -s -o /dev/null -w "localhost_webhook_http_code=%{http_code}\n" http://127.0.0.1:8080/api/github/webhook || true
          echo "Post-deploy app logs:"
          docker compose -f docker-compose.server.yml logs --no-color --tail=100 app || true
          EOF
